<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Management App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Patient Registry System</h1>

<div class="card">
  <h2>Add Patient</h2>
  <input type="text" id="mrn" placeholder="Enter medical record number" />
  <input type="text" id="name" placeholder="Enter patient name" />
  <input type="number" id="age" placeholder="Enter patient age" />
  <button class="add-btn" onclick="addPatient()">Add Patient</button>
  <p id="message"></p>
</div>

    <div class="card">
      <h2>Patient List</h2>
      <ul id="patientList"></ul>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
